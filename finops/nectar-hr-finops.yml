description: >-
  FinOps view of Nectar spend. Nectar's Recognize platform is a per-employee
  monthly subscription (billed annually) with a published annual minimum, sold
  in Plus and Premium tiers plus custom Enterprise. On top of the subscription,
  the dominant variable cost is rewards redemption - points employees redeem
  against the global rewards catalog (gift cards, Amazon, swag, custom company
  rewards) become real spend, which the API surfaces via the financial
  redemptions report. The Open API itself is a plan-gated add-on rather than a
  metered, usage-billed product.
notes: >-
  Per-user rates ($5 Plus / $6 Premium, annual) are third-party reported and
  unreconciled; verify with Nectar sales. Track redemption spend as the primary
  variable cost driver via GET /v1/analytics/financial/redemptions.
