aid: nectar-hr
url: https://raw.githubusercontent.com/api-evangelist/nectar-hr/refs/heads/main/apis.yml
name: Nectar
kind: company
description: Nectar is an employee recognition and rewards platform that helps
  organizations build culture through peer-to-peer and manager recognition,
  a points-based global rewards catalog (gift cards, Amazon, swag, custom
  company rewards), automated milestone celebrations, and internal comms.
  Nectar exposes a documented Open API (base https://api.nectarhr.com, Swagger
  at /docs) covering users, the company recognition feed, custom awards,
  financial redemption analytics, and Flow triggers. The API is an account
  add-on - access is enabled by Nectar support/your account manager and then a
  scoped API key is generated in Settings > Integrations; all endpoints use
  Bearer (JWT) authentication.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Employee Recognition
- Rewards
- Points
- HR
- Employee Engagement
- Culture
- People Operations
created: '2026-07-10'
modified: '2026-07-10'
